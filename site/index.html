<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>診所選址評估 — 龜山樂善二路</title>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>診所選址適合度評估</h1>
    <p id="meta-line">載入中…</p>
  </header>

  <main>
    <section class="card">
      <h2>各科適合度排名</h2>
      <p class="hint">總分 = 各因子正規化分數（0–100）× 該科權重，加權平均而得。點選下方科別可看完整拆解。</p>
      <div id="ranking"></div>
    </section>

    <section class="card">
      <h2>各科分數運算明細</h2>
      <div class="select-row">
        <label for="specialty-select">選擇科別：</label>
        <select id="specialty-select"></select>
      </div>
      <div class="table-wrap">
        <table id="breakdown-table">
          <thead>
            <tr>
              <th>因子</th><th>權重</th><th>因子分</th>
              <th>貢獻 = 分×權重÷總權重</th>
            </tr>
          </thead>
          <tbody></tbody>
          <tfoot></tfoot>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>因子原始數據、換算依據與變化</h2>
      <div class="table-wrap">
        <table id="factor-table">
          <thead>
            <tr>
              <th>因子</th><th>原始數據</th><th>換算依據</th>
              <th>正規化分</th><th>較上筆</th><th>來源</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p class="legend">
        來源：<span class="src real">real 實測</span>
        <span class="src degraded">degraded 代理/沿用</span>
        <span class="src manual">manual 待人工</span>
        <span class="src missing">missing 無資料</span>
      </p>
    </section>

    <section class="card">
      <h2>單因子分數趨勢</h2>
      <div class="select-row">
        <label for="factor-select">選擇因子：</label>
        <select id="factor-select"></select>
      </div>
      <canvas id="factorTrendChart"></canvas>
    </section>

    <section class="card">
      <h2>各科別分數趨勢</h2>
      <canvas id="trendChart"></canvas>
    </section>

    <section class="card" id="map-card">
      <h2>商圈地圖（步行 1km / 車程 3km）</h2>
      <div id="map"></div>
    </section>

    <section class="card">
      <h2>3km 內競爭診所清單（<span id="clinic-count">0</span> 家）</h2>
      <div class="table-wrap">
        <table id="clinic-table">
          <thead>
            <tr><th>名稱</th><th>地址</th><th>距離</th><th>競爭權重</th><th>評分</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p id="generated"></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
